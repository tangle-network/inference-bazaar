name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (build · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel (1.91) + clippy/rustfmt components.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      # The core crates (kernel + EIP-712 mirror) are the trust surface re-run by
      # peers and the zkVM guest — held to -D warnings.
      - name: clippy (core crates)
        run: cargo clippy -p surplus-orderbook -p surplus-settlement-core -p surplus-matcher -p surplus-settlement --all-targets -- -D warnings
      - name: test (workspace)
        run: cargo test --workspace
      # Feature surfaces must still compile (chain submit + the PKI mesh transport).
      - name: build (chain)
        run: cargo build -p surplus-operator --features chain
      - name: build (mesh)
        run: cargo build -p surplus-operator --features mesh
      # The matching kernel must keep building no_std (it runs in the SP1 guest).
      - name: build (matcher no_std)
        run: cargo build -p surplus-matcher --no-default-features

  contracts:
    name: contracts (forge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      # Deps are soldeer (foundry.toml `[dependencies]`), not git submodules, so
      # `submodules: recursive` does not fetch them — install explicitly or every
      # forge build/test fails on a missing OpenZeppelin/forge-std import.
      - name: install solidity dependencies (soldeer)
        run: forge soldeer install
      - name: forge fmt
        run: forge fmt --check
      - name: forge build
        run: forge build --sizes
      - name: forge test
        run: forge test -vvv

  parity:
    # The cross-stack EIP-712 pins: Rust and Solidity must derive identical
    # digests. A one-sided change to a struct, domain, or typehash fails here —
    # the gate that would have caught the SettlementBatch/bookId drift.
    name: eip712 parity (rust ↔ solidity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      # Soldeer deps (see contracts job) — needed for the Solidity half below.
      - name: install solidity dependencies (soldeer)
        working-directory: contracts
        run: forge soldeer install
      - name: rust parity pins
        run: cargo test -p surplus-settlement --test parity
      - name: solidity parity pins
        working-directory: contracts
        run: forge test --match-path "test/Eip712Parity.t.sol" -vvv

  zk:
    name: zk (host build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zk
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      # `sp1-prover-types` builds protobuf in its build script; the runner has no
      # protoc by default, so the host build fails before touching our code.
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Host crates compile against the (changing) settlement-core + matcher
      # without the heavy succinct toolchain. The full guest ELF build +
      # in-circuit parity is exercised by the `zk-guest` job below.
      - name: build host (skip guest ELF)
        env:
          SP1_SKIP_PROGRAM_BUILD: "1"
        run: cargo build --release

  zk-guest:
    name: zk (guest ELF + in-circuit parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Install the Succinct toolchain so `cargo prove` can compile the RISC-V
      # guest ELF (sp1-helper build.rs). Without this the guest is a stub and a
      # broken circuit (or a guest/host public-values drift) would ship unnoticed.
      - name: install SP1 toolchain
        run: |
          curl -L https://sp1up.succinct.xyz | bash
          ~/.sp1/bin/sp1up
      # Builds the guest ELF, generates a real mutually-signed crossing order set,
      # runs the guest in execute mode, and asserts its committed public values
      # equal the host's recomputation (domainSeparator, bookId, nonce,
      # ordersCommitment, fillsHash). A circuit change that diverges fails here.
      - name: guest ELF build + in-circuit parity (execute)
        run: bash scripts/prove-batch.sh execute

  e2e:
    name: e2e (settlement spine on anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - uses: foundry-rs/foundry-toolchain@v1
      - name: install solidity dependencies (soldeer)
        working-directory: contracts
        run: forge soldeer install
      # The full guarantee loop end to end on anvil: deploy (book + verifier
      # wired), atomic fill -> receipt redemption -> collateral default ->
      # attested batch -> proven batch (against the strict mock verifier, real
      # match-in-circuit public values). Exercises the chain client's settle
      # paths the live operator uses.
      - name: settlement spine e2e
        run: bash scripts/settlement-e2e.sh

  ts:
    name: ts (packages + app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: packages — install
        run: pnpm install --frozen-lockfile
      - name: packages — typecheck
        run: pnpm -r typecheck
      - name: packages — test
        run: pnpm -r test
      # The app is a separate workspace root.
      - name: app — install
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: app — typecheck
        working-directory: app
        run: pnpm typecheck
