# Compact InferenceBazaar blueprint definition for live chains (Base Sepolia).
# Same blueprint as deploy/blueprint-definition.toml minus the 25 reserved
# filler jobs: on a live chain the stored definition blob costs real gas and
# the padded 31-job table exceeds the node's ~16.7M per-tx cap. Here
# workflow_tick is POSITIONAL INDEX 5; the operator binary routes both 5
# (compact) and 30 (padded devnet convention) to the same handler.

metadata_uri = "https://github.com/tangle-network/inference-bazaar"
manager = "0x0000000000000000000000000000000000000000"
metadata_file = "blueprint-metadata.json"

[metadata]
name = "inference-bazaar"
description = "Open market for AI inference — buy/sell prepaid inference token credits, operators make markets."
author = "Tangle"
category = "inference-market"
license = "MIT OR Apache-2.0"

# The BSM supports both models (see InferenceBazaarBSM); declare both so a service can be
# requested fixed or dynamic — the instance picks at request time.
supported_memberships = ["fixed", "dynamic"]

[[jobs]]
name = "list_instrument"
description = "List a (model, tokenKind) credit market with tick size + min qty."

[[jobs]]
name = "configure"
description = "Set quoting params + risk limits for an instrument."

[[jobs]]
name = "start_making"
description = "Begin making a market in an instrument (enable the tick)."

[[jobs]]
name = "stop_making"
description = "Stop making a market (pull quotes, disable the tick)."

[[jobs]]
name = "status"
description = "Operator health, instruments, inventory, PnL."

[[jobs]]
name = "workflow_tick"
description = "Periodic tick: pull reference price, fetch sidecar quotes, place/update quotes."

[[sources]]
kind = "native"
fetcher = "github"
entrypoint = "inference-bazaar-operator"

[sources.github]
owner = "tangle-network"
repo = "inference-bazaar"
tag = "v0.1.0"

[[sources.github.binaries]]
name = "inference-bazaar-operator"
arch = "amd64"
os = "linux"
sha256 = "abe6c37f140811f5b0196b968da605911689edcb66635e072bb2b9242446c1b5"

[[sources.binaries]]
name = "inference-bazaar-operator"
arch = "amd64"
os = "linux"
sha256 = "abe6c37f140811f5b0196b968da605911689edcb66635e072bb2b9242446c1b5"
