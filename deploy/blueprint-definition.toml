# Deployable Surplus blueprint definition (cargo tangle blueprint deploy tangle
# --definition deploy/blueprint-definition.toml). This is the on-chain shape;
# blueprint.toml stays the human manifest. Job indices are POSITIONAL on-chain:
# 0-4 are the lifecycle jobs, 5-29 are reserved no-ops, 30 is workflow_tick —
# matching the WORKFLOW_TICK_JOB=30 convention the operator's router expects.

metadata_uri = "https://github.com/tangle-network/surplus"
manager = "0x0000000000000000000000000000000000000000"
metadata_file = "blueprint-metadata.json"

[metadata]
name = "surplus"
description = "Open market for AI inference — buy/sell prepaid inference token credits, operators make markets."
author = "Tangle"
category = "inference-market"
license = "MIT OR Apache-2.0"

supported_memberships = ["dynamic"]

[[jobs]]
name = "list_instrument"
description = "List a (model, tokenKind) credit market with tick size + min qty."

[[jobs]]
name = "configure"
description = "Set quoting params + risk limits for an instrument."

[[jobs]]
name = "start_making"
description = "Begin making a market in an instrument (enable the tick)."

[[jobs]]
name = "stop_making"
description = "Stop making a market (pull quotes, disable the tick)."

[[jobs]]
name = "status"
description = "Operator health, instruments, inventory, PnL."

