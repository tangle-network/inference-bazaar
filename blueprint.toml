# InferenceBazaar blueprint manifest (consumed by `cargo tangle blueprint deploy`).
#
# The market-maker operator for inference-token credits. Jobs mirror the
# ai-trading-blueprint lifecycle but for a token-credit market: list an
# instrument, start/stop making a market, push a reference price, and tick.
#
# Job handlers are wired in operator/src/bin/blueprint.rs (the full
# `inference-bazaar-operator` bin, built with `--features blueprint`); the on-chain
# manager is contracts/src/InferenceBazaarBSM.sol (see [blueprint.manager] below).

[blueprint]
name = "inference-bazaar"
description = "Open market for AI inference — buy/sell prepaid inference token credits, operators make markets."
author = "Tangle"
license = "MIT OR Apache-2.0"
category = "inference-market"

# The Blueprint Service Manager: the on-chain hook surface (operator/service
# lifecycle, membership tracking, job attribution) and the slashing origin for
# redemption defaults. Deployed + bootstrapped by contracts/script/Deploy.s.sol
# (or the Tangle runtime); set the address per network.
[blueprint.manager]
evm = "InferenceBazaarBSM"
address = ""

# Membership is an INSTANCE-level setting chosen at service-request time. The
# manager supports BOTH models with the same code path — it records the set, it
# never gates the protocol's own join/leave:
#   - fixed:   operator set frozen at onServiceInitialized (= the approvers).
#   - dynamic: operators may join/leave a live instance (onOperatorJoined/Left).
[blueprint.membership]
models = ["fixed", "dynamic"]
default = "fixed"

[blueprint.operator]
# The full operator binary registered on-chain (built with --features blueprint).
binary = "inference-bazaar-operator"
# HTTP market API the operator serves (see operator/src/main.rs).
http_port = 9100

# Jobs the blueprint exposes. IDs follow the trading-blueprint convention
# (provision/configure/start/stop/status + a periodic tick). Handlers live in
# operator/src/bin/blueprint.rs::router(); only the routed IDs below are served.
#
# IMPORTANT — positional indexing: in compact-definition deployments the runtime
# assigns positional job indices in declaration order, so workflow_tick (the 6th
# entry) lands at index 5 (operator/src/bin/blueprint.rs WORKFLOW_TICK_JOB_COMPACT).
# Jobs 0-4 have ids == declaration positions, so they need no compact remap; only
# workflow_tick (id 30 at position 5) is routed at both ids. Keep the 0-4 order.
[[blueprint.jobs]]
id = 0
name = "list_instrument"
description = "List a (model, tokenKind) credit market with tick size + min qty. [implemented]"

[[blueprint.jobs]]
id = 1
name = "configure"
description = "Retune operator-wide quoting params (size, max inventory, min spread) at runtime. [implemented]"

[[blueprint.jobs]]
id = 2
name = "start_making"
description = "Begin making a market: enable quoting for an instrument. [implemented]"

[[blueprint.jobs]]
id = 3
name = "stop_making"
description = "Stop making a market: disable quoting and pull resting quotes. [implemented]"

[[blueprint.jobs]]
id = 4
name = "status"
description = "Operator health, instruments, inventory, PnL. [implemented]"

[[blueprint.jobs]]
id = 30
name = "workflow_tick"
description = "Periodic tick: pull reference price, fetch sidecar quotes, place/update quotes. [implemented]"

# Settlement: the legacy rails (chosen per order, never hard-wired) plus the
# firm rail — EIP-712 signed orders cleared atomically on InferenceBazaarSettlement.
[blueprint.settlement]
rails = ["router-credits", "shielded", "firm"]
# Router rail: the live Tangle Router / platform balance (Stripe + on-ramp).
router_url = "https://router.tangle.tools"
# Shielded rail: on-chain ShieldedCredits (set per network at deploy time).
shielded_credits_address = ""
# Firm rail: InferenceBazaarSettlement (contracts/src/InferenceBazaarSettlement.sol) — atomic
# fill settlement, collateral-backed credit lots, redemption defaults, batched
# verification by attester quorum or SP1 proof. Deploy via
# contracts/script/Deploy.s.sol; set per network.
inference_bazaar_settlement_address = "0x31D0215d77A06ff97Cb61BbBe4b931Ac0D1da8aA"
